memory:
  short_memory_size: 10
  mid_memory:
    max_size: 2000
    min_chunk_size: 3
    max_chunk_size: 5
    message_chunk_max_chars: 600
    message_chunk_overlap_chars: 90
    message_chunk_min_chars: 120
    message_chunk_boundary_window_chars: 80
    chunk_similarity_threshold: 0.55
    embedding_min_length: 20
    database_file: data/processed/mid_memory.db
    sqlite_busy_timeout_ms: 5000
    sqlite_journal_mode: WAL
    sqlite_synchronous: NORMAL
    sqlite_checkpoint_on_commit: true
    sqlite_checkpoint_mode: TRUNCATE
    role:
      enable: true
      user_weight: 1.0
      assistant_weight: 0.7
      system_weight: 0.5
      centroid_roles:
        - user
        - assistant
      centroid_role_weights:
        user: 1.0
        assistant: 0.5
        system: 0.3
      non_user_threshold_multiplier: 1.0
    chunking:
      role_boundary_flush: false
      use_buffer_centroid_similarity: true
    stopwords:
      - a
      - an
      - and
      - are
      - as
      - at
      - be
      - by
      - for
      - from
      - in
      - is
      - it
      - of
      - on
      - or
      - that
      - the
      - to
      - was
      - with
  long_memory:
    enabled: true
    staging_enabled: true
    supersede_min_evidence_overlap: 0.25
    database_file: data/processed/long_memory.db
    sqlite_busy_timeout_ms: 5000
    sqlite_journal_mode: WAL
    sqlite_synchronous: NORMAL
    retrieval_top_k: 6
    retrieval_min_score: 0.1
    details_per_event: 0
    context_max_items: 4
    context_max_chars_per_item: 420
    context_evidence_max_chars: 260
    context_source_max_chars: 180
    context_include_source: true
    context_chain_enabled: true
    context_chain_size: 3
    context_chain_max_chars: 900
    extractor:
      enabled: true
      mode: sentence_fact
      model: qwen3:8b
      temperature: 0.1
      timeout_sec: 120
      retry_max_attempts: 1
      retry_backoff_sec: 1.0
      retry_on_timeout: true
      retry_on_http_502: true
      retry_on_url_error: false
      min_confidence: 0.5
      max_events_per_message: 6
      process_roles:
        - user
      min_chars: 40
      max_chars: 1400
      input_max_chars: 1200
      max_output_tokens: 320
      force_json_output: true
      think: false
      require_action: false
      min_filled_fields: 2
      require_evidence_span: true
      reject_pronoun_subject: false
      subject_pronouns:
        - i
        - you
        - we
        - he
        - she
        - they
        - it
        - me
        - us
        - him
        - her
        - them
      keyword_max_count: 12
      no_source_keyword_fallback: true
      keyword_blacklist:
        - im
        - i'm
        - my
        - your
        - user
        - assistant
        - system
        - conversation
        - chat
        - just
        - very
        - really
      entity_normalization:
        enabled: true
        pronoun_map:
          i: user
          me: user
          my: user
          mine: user
          myself: user
          we: user
          us: user
          our: user
          ours: user
          you: user
          your: user
          yours: user
        possessive_prefixes:
          - my
          - your
          - our
          - their
          - his
          - her
      fact_filter:
        enabled: true
        hint_keywords:
          - check
          - ask
          - consider
          - should
          - recommend
          - suggestion
          - tip
          - tips
          - advice
          - remember
          - compare
          - review
          - referrals
          - quote
          - quotes
          - experience
          - glad
          - great
          - happy
          - feel
          - feels
          - feeling
        fact_keywords:
          - bought
          - moved
          - met
          - scheduled
          - booked
          - paid
          - started
          - finished
          - visited
          - got
          - serviced
          - happened
          - diagnosed
          - arrived
          - left
          - traveled
          - called
          - sent
      sentence_overlap: 1
      sentence_min_chars: 40
      compact_retry_enabled: true
      compact_window_chars: 600
      span_grounding_min_overlap: 0.35
      gating:
        enabled: true
        hard_only: true
        hard_require_action: false
        hard_require_subject_or_object: true
        hard_min_confidence: 0.3
        quality_threshold: 0.55
        weight_completeness: 0.45
        weight_grounding: 0.35
        weight_keyword: 0.15
        weight_structure: 0.05
        pronoun_penalty: 0.10
        keyword_empty_score: 0.40
        grounding_missing_score: 0.50
        log_rejections: true
      extract_every_n_messages: 3
      warmup_enabled: true
      warmup_timeout_sec: 30
      warmup_prompt: Return OK.
    retrieval_scoring:
      use_embedding: true
      lexical_weight: 0.4
      embedding_weight: 0.5
      embedding_fallback_weight: 0.7
      value_overlap_weight: 0.2
      evidence_overlap_weight: 0.15
      value_overlap_min_tokens: 1
      evidence_overlap_min_tokens: 1
      temporal_filter_enabled: true
      temporal_query_time_boost: 1.15
      temporal_query_no_time_penalty: 0.75
      keyword_primary_min_overlap: 1
      keyword_density_weight: 0.3
      recency_weight: 0.1
      history_enabled: true
      history_weight: 0.7
      history_max_candidates: 128
      include_hints: false
    graph:
      neighbor_limit: 4
      neighbor_weight: 0.15
      max_edges_per_event: 6
      same_subject_enabled: true
      same_subject_weight: 0.25
      co_source_enabled: true
      co_source_weight: 0.18
    node_graph:
      enabled: true
      node_boost_weight: 0.2
      node_edge_boost_weight: 0.12
      context_nodes_per_event: 6
      keyword_nodes_limit: 5
    offline_graph:
      enabled: true
      build_top_chunks: 14
      adaptive_top_chunks_enabled: true
      adaptive_top_chunks_min: 8
      adaptive_top_chunks_max: 24
      adaptive_score_gap_threshold: 0.08
      min_pieces_per_query: 8
      build_chunk_max_chars: 1200
      use_full_chunk_text: true
      user_priority_enabled: true
      assistant_max_ratio: 0.35
      system_max_ratio: 0.15
      adaptive_role_cap_enabled: true
      assistant_min_keep: 1
      assistant_signal_threshold: 0.45
      assistant_hard_filter_enabled: false
      assistant_hard_filter_when_user_exists: true
      assistant_answer_cue_keywords:
        - bought
        - moved
        - met
        - graduated
        - certification
        - completed
        - currently
        - now
        - score
        - gpa
        - owns
        - own
        - where
        - when
        - how many
      ingest_input_max_chars: 1200
      evidence_pack_enabled: false
      evidence_pack_max_packs: 4
      evidence_pack_max_chars: 220
      evidence_pack_min_sentence_chars: 24
      evidence_pack_top_sentences_per_chunk: 3
    query_struct:
      enabled: false
      model: qwen3:8b
      temperature: 0.0
      timeout_sec: 120
      max_keywords: 8
      max_output_tokens: 96
      force_json_output: true
      think: false

retrieval:
  top_k: 5
  hybrid_alpha: 0.6
  keyword_weight: 0.25
  time_weight: 0.2
  temporal_boost_max: 0.25
  lexical_search:
    enabled: true
    bm25_top_n: 40
  fusion:
    rrf_k: 60
    dense_weight: 1.0
    lexical_weight: 1.0
  diversity:
    enabled: true
    similarity_threshold: 0.82
  global_chunk_retrieval:
    enabled: true
    top_n: 40
    rrf_k: 60
    dense_weight: 1.2
    lexical_weight: 1.0
    keyword_weight: 0.1
    prefilter_enabled: true
    prefilter_top_n: 256
    lexical_prefilter_top_n: 256
    recent_fallback_n: 64
    dedup_by_text: true
  global_sentence_retrieval:
    enabled: true
    top_n: 40
    rrf_k: 60
    dense_weight: 1.2
    lexical_weight: 1.0
    keyword_weight: 0.1
    prefilter_enabled: true
    prefilter_top_n: 384
    lexical_prefilter_top_n: 384
    recent_fallback_n: 128
    dedup_by_text: true
    sentence_max_chars: 320
    sentence_min_chars: 24
  temporal_anchor_retrieval:
    enabled: true
    require_temporal_cue: true
    cue_keywords:
      - first
      - earlier
      - later
      - before
      - after
      - days
      - day
      - date
      - when
      - between
    max_options: 3
    extra_queries_per_option: 2
    top_n_per_query: 10
    additive_limit: 8
  query_focus_retrieval:
    enabled: false
    require_cue: false
    cue_keywords: []
    model: qwen3:8b
    temperature: 0.0
    timeout_sec: 120
    max_queries: 4
    top_n_per_query: 8
    additive_limit: 6
    max_output_tokens: 120
    force_json_output: true
    think: false
  query_plan:
    enabled: true
    max_sub_queries: 4
    slot_coverage_weight: 0.35
    llm_assist_enabled: true
    llm_phrase_max: 3
    llm_phrase_min_tokens: 2
  gap_detector:
    enabled: true
    max_rounds: 2
    max_queries: 2
    top_n_per_query: 8
    additive_limit: 6
  evidence_graph:
    enabled: true
    filter_enabled: true
    claims_enabled: true
    light_graph_enabled: true
    model: qwen3:8b
    temperature: 0.0
    timeout_sec: 120
    max_output_tokens: 384
    force_json_output: true
    think: false
    extractor_batch_size: 8
    extractor_max_claims_per_batch: 12
    extractor_max_batches: 3
    filter_max_core: 8
    filter_max_supporting: 10
    filter_max_conflict: 6
    filter_max_backup: 3
    filter_max_selected: 22
    filter_split_long_chars: 380
    filter_min_sentence_chars: 18
    filter_core_min_score: 0.34
    filter_supporting_min_score: 0.22
    filter_core_rag_cap: 5
    filter_core_pack_cap: 3
    filter_core_plan_cap: 3
  compare_option_pool:
    top_n_chunks_per_option: 3
  graph_build_retry:
    enabled: true
    expanded_top_n: 64
    ingest_top_chunks: 14
    use_temporal_anchors: true
    anchor_query_limit: 4
    anchor_top_n_per_query: 8
  graph_build_role_weights:
    user: 1.0
    assistant: 0.7
    system: 0.5
  long_memory_context:
    enabled: true
    query_graph_enabled: false
    prepend_before_mid_context: true
  answering:
    graph_refiner_enabled: true
    graph_context_from_store_enabled: true
    reasoning_fallback_enabled: false
    specialist_layer:
      enabled: true
      modules:
        - counting
        - graph_toolkit
      counting_enabled: true
      graph_toolkit_enabled: true
      min_confidence: 0.55
      allow_fallback_override: true
      max_hint_lines: 8
    evidence_top_n_chunks: 10
    evidence_top_n_sentences: 12
    evidence_sentence_max_chars: 280
    candidate_top_n: 3
    context_only: true
    log_decision_details: true
    llm_fallback_to_top_candidate: true
    fallback_min_score: 0.75
    response_evidence_min_token_overlap: 0.6
    response_evidence_min_shared_tokens: 2
    not_found_top_evidence_score_threshold: 0.35
    second_pass_llm_enabled: true
    second_pass_use_evidence_candidate: true
    not_found_force_evidence_candidate_when_available: true
    span_min_tokens: 1
    span_max_tokens: 5
    span_top_n_per_sentence: 8
    postprocess:
      enabled: true
      strip_prefixes:
        - the answer is
        - it was
        - it is
      issue_with_pattern_enabled: true
    evidence_candidate:
      enabled: true
      min_score: 0.45
      max_tokens: 8
    candidate_filter:
      enabled: true
      min_token_count: 2
      role_prefixes:
        - user
        - assistant
        - system
      reject_prefixes:
        - i
        - i'm
        - i am
        - my
        - we
        - we're
        - we are
        - you
        - your
      reject_contains:
        - thank
        - sorry
        - maybe
        - i think
        - i guess
        - let me
        - how can i
    intent_extraction:
      enabled: true
      time_keywords:
        - when
        - date
        - time
        - year
        - month
        - day
        - long
        - duration
      number_keywords:
        - many
        - much
        - number
        - amount
        - percent
        - age
        - price
      location_keywords:
        - where
        - location
        - city
        - country
        - place
      name_keywords:
        - name
        - called
        - titled
      time_regexes:
        - "\\b\\d{4}[/-]\\d{1,2}[/-]\\d{1,2}\\b"
        - "\\b\\d{1,2}[/-]\\d{1,2}[/-]\\d{2,4}\\b"
        - "\\b\\d{1,2}:\\d{2}\\s?(?:am|pm)?\\b"
        - "\\b\\d+\\s?(?:minute|minutes|hour|hours|day|days|week|weeks|month|months|year|years)\\b"
        - "\\b(?:jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec)[a-z]*\\s+\\d{1,2}(?:st|nd|rd|th)?(?:,\\s*\\d{4})?\\b"
      number_regexes:
        - "\\b\\d+(?:\\.\\d+)?\\b"
        - "\\b\\d+(?:\\.\\d+)?\\s?(?:%|percent|km|kilometer|kilometers|miles?|hours?|minutes?|days?|years?)\\b"
      capitalized_phrase_max_tokens: 4
    candidate_scoring:
      min_score: 0.35
      reject_tokens:
        - also
        - and
        - or
        - but
        - then
        - inbox
    temporal_event_anchor_enabled: true
    temporal_event_anchor_min_overlap: 0.5
    temporal_event_anchor_min_score: 0.2
    temporal_event_anchor_pair_min_score: 0.6
    temporal_event_anchor_use_session_date_fallback: true
    temporal_event_anchor_fallback_to_sentence_score: true
    counting:
      enabled: true
      count_query_keywords:
        - how many
        - number of
        - count
        - total
      day_count_keywords:
        - how many days
        - days before
        - days after
      date_regexes:
        - "\\b\\d{4}[/-]\\d{1,2}[/-]\\d{1,2}\\b"
        - "\\b\\d{1,2}[/-]\\d{1,2}[/-]\\d{2,4}\\b"
        - "\\b\\d{1,2}[/-]\\d{1,2}\\b"
        - "\\b(?:jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec)[a-z]*\\s+\\d{1,2}(?:st|nd|rd|th)?(?:,\\s*\\d{4})?\\b"
      list_count_enabled: true
      list_count_query_keywords: []
      list_count_min_unique_entities: 2
      list_count_max_entity_tokens: 4
      list_count_stopwords:
        - thing
        - things
        - item
        - items
        - name
        - names
        - mention
        - mentioned
        - list
        - listed
        - ones
        - one
      list_count_focus_stopwords:
        - how
        - many
        - number
        - count
        - did
        - do
        - does
        - i
        - we
        - you
        - mention
        - mentioned
        - in
        - the
        - a
        - an
        - of
        - to
        - for
        - with
        - and
      list_count_focus_min_overlap: 1
      list_count_irregular_forms:
        buy:
          - bought
        go:
          - went
      numeric_answer_filter:
        enabled: true
        focus_min_overlap: 1
        allowed_units:
          - ""
          - time
          - times
          - event
          - events
          - item
          - items
          - people
          - persons
        disallowed_units:
          - km
          - kilometer
          - kilometers
          - mile
          - miles
          - m
          - meter
          - meters
          - usd
          - dollar
          - dollars
          - percent
          - "%"

embedding:
  dim: 512
  model: nomic-embed-text
  cache_size: 2048
  truncate_or_pad: true

time_extraction:
  regexes:
    - "\\b\\d{4}[/-]\\d{1,2}[/-]\\d{1,2}\\b"
    - "\\b\\d{1,2}[/-]\\d{1,2}[/-]\\d{2,4}\\b"
    - "\\b(?:jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec)[a-z]*\\s+\\d{1,2}(?:st|nd|rd|th)?(?:,\\s*\\d{4})?\\b"

llm:
  default_model: qwen3:8b
  supported_models:
    - qwen3:8b
    - deepseek-r1:8b
    - qwen3:4b
  embedding_timeout_sec: 60
  host: http://127.0.0.1:11434
  temperature: 0.2
  request_timeout_sec: 360
  max_output_tokens: 256
  retry:
    max_attempts: 2
    backoff_sec: 1.0
    retry_on_timeout: true
    retry_on_http_502: true
    retry_on_url_error: false

logging:
  log_file: logs/system.log
  level: INFO
  console_enabled: true

dataset:
  stream_mode: true
  stream_read_size: 4096
  eval_max_instances: 0
  eval_print_prediction_chars: 160
  eval_splits:
    sample20: data/raw/LongMemEval/longmemeval_s_sample_20.json
    oracle: data/raw/LongMemEval/longmemeval_oracle.json
    ragdebug10: data/raw/LongMemEval/longmemeval_ragdebug10_rebuilt.json
    locomo10: data/raw/LoCoMo/locomo10.json
  default_eval_split: sample20

evaluation:
  isolated_per_instance: true
  group_by_question_type: true
  report_abstention_separately: true
  use_short_context_in_eval: false
  eval_answer_style: "Answer with only the final answer. No explanation."
  compute_evidence_recall: true
  compute_answer_span_hit: true
  compute_support_sentence_hit: true
  offline_graph_build_enabled: true
  save_to_db: true
  database_file: data/processed/thesis_eval.db
  run_table: eval_runs
  result_table: eval_results
  group_table: eval_group_results
  thesis_run_table: thesis_eval_runs
  thesis_type_table: thesis_eval_type_metrics
  thesis_report_dir: data/processed/thesis_reports_debug_analysis
  thesis_graph_dir: data/graphs_thesis_debug_analysis
  thesis_subset_dir: data/raw/LongMemEval/thesis_subsets
  thesis_graph_db_file: data/processed/thesis_graph_runs/thesis_graph_runs.db
  oracle_temporal:
    disable_temporal_weight: true
    dataset_keyword: oracle
  matching:
    mode: em_or_f1
    f1_threshold: 0.6
    substring_match: false
    numeric_tolerance: 0.0
    numeric_match:
      enabled: true
      reference_regex: "^\\s*[-+]?\\d*\\.?\\d+(\\s*[a-z]+)?\\s*$"
    normalize:
      lowercase: true
      strip_punctuation: true
      strip_articles: true
      article_tokens:
        - a
        - an
        - the
      collapse_whitespace: true
    answer_split:
      enabled: true
      delimiters:
        - "\n"
        - "also acceptable"
        - "acceptable answer"
      regex_separators:
        - "\\.\\s+"
        - "\\s+or\\s+"
        - ";"
      max_candidates: 8
    support_hit:
      min_overlap_ratio: 0.5
      min_overlap_tokens: 2
  locomo:
    drop_empty_answers: true
    drop_categories:
      - 5
    max_qas_per_sample: 0
